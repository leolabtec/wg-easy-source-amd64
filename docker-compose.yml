services:
  wg-easy:
    image: ghcr.io/leolabtec/wg-easy-source-amd64:source-78b2838-amd64
    container_name: wg-easy
    restart: unless-stopped

    environment:
      # Web UI runs over plain HTTP and is bound only to LAN_BIND_IP below.
      # If you put Web UI behind HTTPS reverse proxy, set this to false.
      - INSECURE=true
      - PORT=51821
      - HOST=0.0.0.0
      - DISABLE_IPV6=false

    volumes:
      - etc_wireguard:/etc/wireguard
      # Only enable these two lines if your host needs the container to load
      # WireGuard kernel modules dynamically.
      # - /lib/modules:/lib/modules:ro

    ports:
      # Public WireGuard endpoint. Open this as UDP on your router/firewall.
      - "51820:51820/udp"
      # Web UI. Bind to the server LAN IP only, never 0.0.0.0 on a public host.
      - "${LAN_BIND_IP}:51821:51821/tcp"

    cap_add:
      - NET_ADMIN
      # Only enable if you also mount /lib/modules above and need module loading.
      # - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

volumes:
  etc_wireguard:
